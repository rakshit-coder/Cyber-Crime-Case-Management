{% extends "base.html" %}

{% block title %}Add User - Cyber Crime System{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-4xl font-bold text-slate-900 flex items-center gap-2">
                <i class="fas fa-user-plus text-blue-600"></i>
                Add New User
            </h1>
            <p class="text-slate-600 mt-2">Create a new user account</p>
        </div>
        <a href="{% url 'manage_users' %}" class="inline-flex items-center gap-2 text-blue-600 hover:text-blue-700 font-semibold">
            <i class="fas fa-arrow-left"></i> Back to Users
        </a>
    </div>

    <div class="bg-white rounded-lg shadow-md border border-slate-100 p-8">
        <form method="post" class="space-y-6">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">First Name *</label>
                    <input type="text" name="first_name" required
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                        placeholder="Enter first name">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">Last Name *</label>
                    <input type="text" name="last_name" required
                        class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                        placeholder="Enter last name">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Username *</label>
                <input type="text" name="username" required
                    class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                    placeholder="Enter username">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Email *</label>
                <input type="email" name="email" required
                    class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                    placeholder="Enter email address">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Phone</label>
                <input type="tel" name="phone"
                    class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                    placeholder="Enter phone number">
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">Password *</label>
                <input type="password" name="password" required minlength="8"
                    class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
                    placeholder="Enter password (min 8 characters)">
            </div>

            <div class="flex gap-4 pt-4">
                <button type="submit" class="flex-1 bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition-colors">
                    <i class="fas fa-plus-circle"></i> Create User
                </button>
                <a href="{% url 'manage_users' %}" class="flex-1 bg-slate-200 text-slate-700 py-3 rounded-lg font-semibold hover:bg-slate-300 transition-colors text-center">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
